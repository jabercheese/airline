<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛬 NEXUS_ATC // TERMINAL_CONTROL_CENTER</title>
    <style>
        :root {
            --sky-blue: #00d2ff;
            --radar-bg: #030a16;
            --panel-bg: #0b1528;
            --border-blue: #1c3d5a;
            --alert-red: #ff3333;
            --success-green: #00ff66;
            --warning-amber: #ffaa00;
            --text-light: #e2e8f0;
            --font-stack: 'Segoe UI', system-ui, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-stack); }
        body { background: var(--radar-bg); color: var(--text-light); padding: 15px; }

        /* Unified Top Navigation Status Strip */
        header { background: var(--panel-bg); border: 1px solid var(--border-blue); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-radius: 4px; margin-bottom: 15px; }
        .header-title { font-size: 16px; font-weight: 800; letter-spacing: 1px; color: var(--sky-blue); }
        .live-timer { font-family: monospace; font-size: 14px; background: #040914; padding: 4px 10px; border-radius: 3px; border: 1px solid var(--border-blue); }

        /* Split-Screen Dashboard Structure Layout */
        .split-dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; height: calc(100vh - 85px); min-height: 650px; }
        
        .side-panel { background: var(--panel-bg); border: 1px solid var(--border-blue); border-radius: 4px; padding: 15px; display: flex; flex-direction: column; }
        .panel-header { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding-bottom: 8px; margin-bottom: 12px; border-bottom: 2px solid var(--border-blue); color: var(--sky-blue); display: flex; justify-content: space-between; align-items: center; }

        .scrollable-stack { flex: 1; overflow-y: auto; padding-right: 4px; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--border-blue); border-radius: 3px; }

        /* Left Side: Air Traffic Vectors Components Templates */
        .flight-row { background: rgba(28, 61, 90, 0.2); border: 1px solid var(--border-blue); padding: 12px; margin-bottom: 8px; border-radius: 3px; position: relative; transition: 0.2s; }
        .flight-row.emergency-status { border-color: var(--alert-red); background: rgba(255, 51, 51, 0.08); animation: pulse-alert 2s infinite; }
        .flight-meta { display: grid; grid-template-columns: 1.5fr 1fr 1.2fr 1fr; gap: 10px; font-size: 13px; font-family: monospace; align-items: center; }
        
        /* State Indicators Progress Tracking Meter */
        .state-track { font-weight: bold; padding: 2px 6px; border-radius: 2px; font-size: 11px; text-transform: uppercase; text-align: center; }
        .state-inbound { background: #1a365d; color: #93c5fd; }
        .state-approach { background: #5b21b6; color: #ddd6fe; }
        .state-landed { background: #065f46; color: #a7f3d0; }
        .state-atgate { background: #374151; color: #f3f4f6; }

        /* Right Side: Customs Intercept Profile Sheet Templates */
        .passenger-clearance-box { background: #0d1b2a; border: 1px solid var(--border-blue); padding: 15px; border-radius: 3px; margin-bottom: 10px; }
        .pax-profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 15px; font-size: 13px; margin: 10px 0; font-family: monospace; }
        .flag-indicator { font-weight: bold; font-size: 11px; padding: 2px 6px; border-radius: 2px; text-transform: uppercase; }
        .flag-passed { background: rgba(0, 255, 102, 0.15); color: var(--success-green); border: 1px solid var(--success-green); }
        .flag-failed { background: rgba(255, 51, 51, 0.15); color: var(--alert-red); border: 1px solid var(--alert-red); }

        /* Action Buttons Core Utility Framework triggers */
        .btn { padding: 6px 12px; border: none; border-radius: 3px; font-size: 12px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.15s; }
        .btn-primary { background: var(--sky-blue); color: #000; }
        .btn-primary:hover { opacity: 0.9; box-shadow: 0 0 8px var(--sky-blue); }
        .btn-danger { background: var(--alert-red); color: #fff; }
        .btn-danger:hover { opacity: 0.9; box-shadow: 0 0 8px var(--alert-red); }
        .btn-success { background: var(--success-green); color: #000; }
        .btn-success:hover { opacity: 0.9; box-shadow: 0 0 8px var(--success-green); }
        .btn-disabled { background: #223; color: #556; cursor: not-allowed; }

        /* Animation System Core Definitions */
        @keyframes pulse-alert { 0%, 100% { border-color: var(--alert-red); } 50% { border-color: #500; } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div class="header-title">📡 NEXUS AUTOMATED AIRSPACE &amp; PORTAL MATRIX CONTROL</div>
        <div class="live-timer" id="lbl-radar-clock">SYS_TICK: 0000.00</div>
    </header>

    <div class="split-dashboard">

        <div class="side-panel">
            <div class="panel-header">
                <span>✈️ Live Approach Queue Vectors</span>
                <button class="btn btn-primary" style="font-size: 11px; padding: 4px 8px;" onclick="injectIncomingFlightVector()">Inject Vector Flight (+)</button>
            </div>
            
            <div class="scrollable-stack" id="frame-airspace-stack">
                </div>
        </div>

        <div class="side-panel">
            <div class="panel-header">
                <span>🛂 Customs Enforcement Terminal Interceptions</span>
                <span id="lbl-customs-count" style="font-family: monospace; color: var(--warning-amber);">0 Flagged Profiles Pending</span>
            </div>

            <div class="scrollable-stack" id="frame-customs-stack">
                <div style="text-align: center; margin-top: 50px; color:#4a5568; font-size:13px; font-style:italic;">
                    No profiles currently flagged for secondary inspection. Arriving passenger streams operating nominally...
                </div>
            </div>
        </div>

    </div>

    <script>
        let airportDatabaseState = {
            flights: [
                { id: "EM-402", origin: "London (LHR)", fuel: 72, state: "Inbound", gate: "GATE-A1", manifests: [] },
                { id: "QA-911", origin: "Doha (DOH)", fuel: 24, state: "Final Approach", gate: "GATE-B3", manifests: [] },
                { id: "UA-107", origin: "New York (JFK)", fuel: 85, state: "Inbound", gate: "GATE-C2", manifests: [] }
            ],
            flaggedCustomsProfiles: [],
            systemTickCounter: 0,
            gatesList: ["GATE-A1", "GATE-A2", "GATE-B3", "GATE-C1", "GATE-C2"]
        };

        window.onload = function() {
            // Seed base baseline manifest array details directly upon startup loop processing
            airportDatabaseState.flights.forEach(f => generatePassengerManifestForFlight(f));
            
            renderAirspaceRadarStack();
            renderCustomsScreeningStack();
            
            // Core Simulation Heartbeat Engine Ticks (Every 2.5 seconds updates parameters states)
            setInterval(executeGlobalSimulationStepHeartbeat, 2500);
        };

        /* AUTOMATED TIMED STATE PROGRESSION LOOPS ENGINE ENGINE */
        function executeGlobalSimulationStepHeartbeat() {
            airportDatabaseState.systemTickCounter++;
            document.getElementById('lbl-radar-clock').innerText = `SYS_TICK: ${String(airportDatabaseState.systemTickCounter).padStart(4, '0')}.HZ`;

            // State Pipeline Reducer Map Framework Definitions
            const stateSequencePipeline = {
                "Inbound": "Final Approach",
                "Final Approach": "Landed",
                "Landed": "At Gate"
            };

            airportDatabaseState.flights.forEach(flight => {
                // Deduct fuel reserves for all flights still actively moving through the air
                if (flight.state === "Inbound" || flight.state === "Final Approach") {
                    flight.fuel = Math.max(0, flight.fuel - Math.floor(Math.random() * 6) - 4);
                }

                // Automatic State Progression Logic
                // Landed and At Gate states automatically clear down after time blocks
                if (flight.state === "At Gate") {
                    // Flight departs/turns around, remove from active display parameters
                    flight.markedForPurge = true;
                } else if (flight.state === "Landed") {
                    flight.state = "At Gate";
                    // When flight reaches gate, dump its flagged travelers database elements instantly into immigration screen
                    deployFlightManifestToCustomsRegistry(flight);
                } else {
                    // Standard incremental pipeline transformation unless flight is running out of gas reserves
                    if (flight.fuel > 15 || flight.state === "Final Approach") {
                        // Regular 35% natural chance per heartbeat sequence to advance standard positions coordinates
                        if (Math.random() > 0.65) {
                            flight.state = stateSequencePipeline[flight.state];
                        }
                    }
                }
            });

            // Filter out purged records
            airportDatabaseState.flights = airportDatabaseState.flights.filter(f => !f.markedForPurge);

            // Periodically inject random vectors automatically to keep layout active
            if (Math.random() > 0.8 && airportDatabaseState.flights.length < 6) {
                injectIncomingFlightVector();
            }

            renderAirspaceRadarStack();
            renderCustomsScreeningStack();
        }

        /* DATA ARRAY PROFILE INITIALIZATION GENERATORS */
        function generatePassengerManifestForFlight(flightObj) {
            const firstNames = ["Liam", "Sophia", "Amir", "Elena", "Yuki", "Carlos", "Fatima", "Oliver"];
            const lastNames = ["Smith", "Ivanov", "Al-Saeed", "Chen", "Garcia", "Tanaka", "Müller", "Davis"];
            const countries = ["United Kingdom", "United States", "Germany", "Japan", "Brazil", "Egypt", "Canada"];

            let paxCount = Math.floor(Math.random() * 3) + 2; // Keep arrays limited for scannable interface
            flightObj.manifests = [];

            for (let i = 0; i < paxCount; i++) {
                let pfn = firstNames[Math.floor(Math.random() * firstNames.length)];
                let pln = lastNames[Math.floor(Math.random() * lastNames.length)];
                
                // Random metadata assignment calculations values formulas
                let isPassportValid = Math.random() > 0.12; 
                let isBaggageFlagged = Math.random() > 0.75; 

                flightObj.manifests.push({
                    passengerId: "PX-" + Math.floor(1000 + Math.random() * 9000),
                    fullName: `${pfn} ${pln}`,
                    citizenship: countries[Math.floor(Math.random() * countries.length)],
                    passportValid: isPassportValid,
                    baggageScanFlagged: isBaggageFlagged
                });
            }
        }

        function injectIncomingFlightVector() {
            const identifiers = ["EK", "EY", "QR", "BA", "LH", "AF"];
            const globalCities = ["Paris (CDG)", "Tokyo (HND)", "Cairo (CAI)", "Sydney (SYD)", "Mumbai (BOM)"];
            
            let fid = identifiers[Math.floor(Math.random() * identifiers.length)] + "-" + Math.floor(100 + Math.random() * 900);
            let corigin = globalCities[Math.floor(Math.random() * globalCities.length)];
            let fgate = airportDatabaseState.gatesList[Math.floor(Math.random() * airportDatabaseState.gatesList.length)];

            let newFlight = {
                id: fid,
                origin: corigin,
                fuel: Math.floor(45 + Math.random() * 50),
                state: "Inbound",
                gate: fgate,
                manifests: []
            };

            generatePassengerManifestForFlight(newFlight);
            airportDatabaseState.flights.push(newFlight);
            renderAirspaceRadarStack();
        }

        function deployFlightManifestToCustomsRegistry(flightObj) {
            flightObj.manifests.forEach(pax => {
                // Profiles get sent to customs screening panel if passport is expired OR baggage scan throws alert
                if (!pax.passportValid || pax.baggageScanFlagged) {
                    // Verify if duplicate object is already tracked before committing arrays
                    if (!airportDatabaseState.flaggedCustomsProfiles.some(p => p.passengerId === pax.passengerId)) {
                        pax.sourceFlightId = flightObj.id;
                        airportDatabaseState.flaggedCustomsProfiles.push(pax);
                    }
                }
            });
        }

        /* AIRSPACE QUEUE OVERRIDE ACTIONS PRIVILEGES INTERACTION */
        function triggerEmergencyLandingQueueVectorBump(flightIdx) {
            let targetFlight = airportDatabaseState.flights[flightIdx];
            if (!targetFlight || targetFlight.state !== "Inbound") return;

            // Instantly elevate state position to front of sequence array
            targetFlight.state = "Final Approach";
            targetFlight.fuel = Math.min(targetFlight.fuel + 5, 25); // Emergency fuel safety adjustment factor logic split
            
            renderAirspaceRadarStack();
        }

        /* CUSTOMS DISPATCH DECISION APPROVAL COMMAND ACTIONS */
        function processCustomsClearanceResolution(paxIdx, resolutionDecisionString) {
            let targetProfile = airportDatabaseState.flaggedCustomsProfiles[paxIdx];
            if (!targetProfile) return;

            if (resolutionDecisionString === 'DEPORT_DENIED') {
                alert(`SECURITY INFRUCTION ACTION SYSTEM: Passenger identity ${targetProfile.fullName} entry has been formally denied. Transferring profile to terminal local custody zone.`);
            } else {
                // Approved entry processing pathway clear flags
                console.log(`Passenger ${targetProfile.fullName} manually cleared by control supervisor.`);
            }

            // Remove profile from pending queue stack arrays
            airportDatabaseState.flaggedCustomsProfiles.splice(paxIdx, 1);
            renderCustomsScreeningStack();
        }

        /* UI RENDERING LAYOUT ENGINE DOM WRITERS */
        function renderAirspaceRadarStack() {
            const container = document.getElementById('frame-airspace-stack');
            container.innerHTML = '';

            if (airportDatabaseState.flights.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding-top:40px; color:#4a5568; font-size:13px;">Airspace Sector Empty. Scanning for incoming telemetry feeds...</div>`;
                return;
            }

            airportDatabaseState.flights.forEach((flight, idx) => {
                let isFuelEmergency = flight.fuel <= 20;
                let isFlyable = (flight.state === "Inbound" || flight.state === "Final Approach");
                
                let stateClass = 'state-inbound';
                if(flight.state === "Final Approach") stateClass = 'state-approach';
                if(flight.state === "Landed") stateClass = 'state-landed';
                if(flight.state === "At Gate") stateClass = 'state-atgate';

                let row = document.createElement('div');
                row.className = `flight-row ${isFuelEmergency && isFlyable ? 'emergency-status' : ''}`;

                row.innerHTML = `
                    <div class="flight-meta">
                        <div>
                            <strong style="font-size:15px; color:#fff;">${flight.id}</strong>
                            <span style="display:block; font-size:11px; color:#718096; margin-top:2px;">Orig: ${flight.origin}</span>
                        </div>
                        <div>
                            <span class="state-track ${stateClass}">${flight.state}</span>
                            <span style="display:block; font-size:11px; text-align:center; color:#718096; margin-top:4px;">${flight.gate}</span>
                        </div>
                        <div>
                            <span style="font-weight:bold; color: ${isFuelEmergency && isFlyable ? 'var(--alert-red)' : 'var(--success-green)'}">
                                FUEL: ${flight.fuel}%
                            </span>
                            <span style="display:block; font-size:10px; color:#718096; margin-top:2px;">PAX COUNTS: ${flight.manifests.length}</span>
                        </div>
                        <div style="text-align: right;">
                            ${(flight.state === 'Inbound') ? 
                                `<button class="btn btn-danger" style="font-size:10px; padding:4px 6px;" onclick="triggerEmergencyLandingQueueVectorBump(${idx})">🚨 BUMP</button>` : 
                                `<button class="btn btn-disabled" style="font-size:10px; padding:4px 6px;" disabled>HOLD</button>`
                            }
                        </div>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function renderCustomsScreeningStack() {
            const container = document.getElementById('frame-customs-stack');
            const counterLabel = document.getElementById('lbl-customs-count');
            
            container.innerHTML = '';
            counterLabel.innerText = `${airportDatabaseState.flaggedCustomsProfiles.length} Flagged Profiles Pending`;

            if (airportDatabaseState.flaggedCustomsProfiles.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; margin-top: 50px; color:#4a5568; font-size:13px; font-style:italic;">
                        No profiles currently flagged for secondary inspection. Arriving passenger streams operating nominally...
                    </div>`;
                return;
            }

            airportDatabaseState.flaggedCustomsProfiles.forEach((pax, idx) => {
                let passportBadge = pax.passportValid ? `<span class="flag-indicator flag-passed">VALID</span>` : `<span class="flag-indicator flag-failed">❌ EXPIRED</span>`;
                let baggageBadge = pax.baggageScanFlagged ? `<span class="flag-indicator flag-failed">⚠️ CONTRABAND_FLAG</span>` : `<span class="flag-indicator flag-passed">CLEARED</span>`;

                let card = document.createElement('div');
                card.className = "passenger-clearance-box";

                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px dashed var(--border-blue); padding-bottom:6px;">
                        <span style="font-weight:bold; color:#fff; font-size:14px;">${pax.fullName} <small style="color:var(--sky-blue); font-weight:normal;">(${pax.passengerId})</small></span>
                        <span style="font-family:monospace; font-size:11px; background:#1c3d5a; padding:2px 6px; border-radius:2px;">FLIGHT: ${pax.sourceFlightId}</span>
                    </div>
                    
                    <div class="pax-profile-grid">
                        <div>CITIZENSHIP: <span style="color:#fff;">${pax.citizenship}</span></div>
                        <div>PASSPORT LOGS: ${passportBadge}</div>
                        <div style="grid-column: span 2; margin-top:4px;">X-RAY SCANNER FEED: ${baggageBadge}</div>
                    </div>

                    <div style="display:flex; gap:10px; margin-top:12px; justify-content: flex-end;">
                        <button class="btn btn-danger" onclick="processCustomsClearanceResolution(${idx}, 'DEPORT_DENIED')">Deport / Deny Entry</button>
                        <button class="btn btn-success" onclick="processCustomsClearanceResolution(${idx}, 'APPROVE_CLEAR')">Acknowledge &amp; Clear</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
